<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <title>albums — pharmaceutical audio</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; background: #ffffff; }
    body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; padding: 3.5rem 4rem; }
    header { margin-bottom: 2.5rem; }
    header a { font-size: 0.78rem; color: #000000; text-decoration: none; letter-spacing: 0.01em; }
    header a:hover { text-decoration: underline; text-underline-offset: 2px; }
    .releases { display: flex; flex-direction: column; gap: 0.15rem; margin-bottom: 2.5rem; }
    .releases a { font-size: 0.78rem; font-weight: 400; color: #000000; text-decoration: none; letter-spacing: 0.01em; line-height: 1.6; width: fit-content; }
    .releases a:hover { text-decoration: underline; text-underline-offset: 2px; }
    #video-mount { position: relative; width: 20rem; max-width: 100%; aspect-ratio: 16 / 9; }
    #video-mount video { position: absolute; inset: 0; width: 100%; height: 100%; display: block; opacity: 0; }
    #video-mount video.active { opacity: 1; }
    video::-webkit-media-controls-overlay-play-button,
    video::-webkit-media-controls-start-playback-button { display: none !important; -webkit-appearance: none; }
  </style>
</head>
<body>
  <header>
    <a href="/audio">← pharmaceutical audio</a>
  </header>
  <div class="releases">
    <a href="https://hazxx.bandcamp.com/album/mpc-1000" target="_blank">mpc 1000, hazxx</a>
    <a href="https://edngrill.bandcamp.com/album/on-the-road-again" target="_blank">on the road again, ed.n.grill</a>
    <a href="https://hazxx.bandcamp.com/album/solid-state-logic" target="_blank">solid state logic, hazxx</a>
    <a href="https://hazxx.bandcamp.com/album/volume" target="_blank">volume, hazxx</a>
    <a href="https://zeninspace.bandcamp.com/album/between-the-abstract-2" target="_blank">between the abstract, zen in space</a>
    <a href="https://hazxx.bandcamp.com/album/adjective" target="_blank">adjective, hazxx</a>
    <a href="https://eden777.bandcamp.com/album/seven-bays" target="_blank">seven bays, eden777</a>
    <a href="https://zeninspace.bandcamp.com/album/earth-tones-reworks" target="_blank">earth tones reworks, zen in space</a>
    <a href="https://zeninspace.bandcamp.com/album/earth-tones" target="_blank">earth tones, zen in space</a>
    <a href="https://francod.bandcamp.com/album/se-ales" target="_blank">señales, franco d'</a>
  </div>
  <div id="video-mount"></div>
  <script>
    (function () {
      var n = 15;
      var base = '/videos_audio/';
      var lastIdx = null;
      function pickIdx() {
        var idx;
        do { idx = Math.floor(Math.random() * n) + 1; } while (idx === lastIdx && n > 1);
        lastIdx = idx;
        return String(idx).padStart(2, '0');
      }
      function makeVid() {
        var v = document.createElement('video');
        v.muted = true; v.defaultMuted = true; v.playsInline = true; v.preload = 'auto';
        v.setAttribute('muted', ''); v.setAttribute('playsinline', ''); v.setAttribute('webkit-playsinline', '');
        v.setAttribute('disablepictureinpicture', ''); v.setAttribute('disableremoteplayback', '');
        v.setAttribute('controlslist', 'nodownload nofullscreen noremoteplayback noplaybackrate');
        return v;
      }
      function lock(v) { v.style.pointerEvents = 'none'; }
      function attach() {
        var mount = document.getElementById('video-mount');
        var current = makeVid(), standby = makeVid();
        current.classList.add('active');
        current.src = base + pickIdx() + '.mp4';
        standby.src = base + pickIdx() + '.mp4';
        mount.innerHTML = '';
        mount.appendChild(current); mount.appendChild(standby);
        function rotate() {
          var t = current; current = standby; standby = t;
          current.classList.add('active');
          standby.classList.remove('active');
          var p = current.play();
          if (p !== undefined) p.then(function () { lock(current); }).catch(function () {});
          standby.src = base + pickIdx() + '.mp4';
          standby.load();
          current.addEventListener('ended', rotate, { once: true });
        }
        current.addEventListener('ended', rotate, { once: true });
        function pauseGuard(v) {
          v.addEventListener('pause', function () {
            if (!v.classList.contains('active')) return;
            if (!v.ended && !v.seeking) setTimeout(function () { v.play().catch(function () {}); }, 50);
          });
        }
        pauseGuard(current); pauseGuard(standby);
        var p = current.play();
        if (p !== undefined) {
          p.then(function () { lock(current); }).catch(function () {
            var kick = function () {
              current.play().then(function () { lock(current); }).catch(function () {});
              document.removeEventListener('click', kick);
              document.removeEventListener('touchstart', kick);
              document.removeEventListener('keydown', kick);
            };
            document.addEventListener('click', kick, { once: true });
            document.addEventListener('touchstart', kick, { once: true });
            document.addEventListener('keydown', kick, { once: true });
          });
        } else { lock(current); }
      }
      if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', attach);
      else attach();
    })();
  </script>
</body>
</html>

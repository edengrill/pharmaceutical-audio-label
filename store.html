<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <title>store</title>
  <meta name="description" content="pharmaceutical audio store.">
  <meta property="og:title" content="pharmaceutical audio — store">
  <meta property="og:description" content="pharmaceutical audio store.">
  <meta property="og:url" content="https://pharmaceutical.audio/store">
  <meta property="og:type" content="website">
  <meta property="og:image" content="https://pharmaceutical.audio/og-image.jpg">
  <meta name="twitter:card" content="summary_large_image">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; background: #ffffff; }
    body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; padding: 3.5rem 4rem; }
    header { margin-bottom: 2.5rem; }
    header a { font-size: 0.78rem; color: #000000; text-decoration: none; letter-spacing: 0.01em; }
    header a:hover { text-decoration: underline; text-underline-offset: 2px; }
    .item { margin-bottom: 2.5rem; }
    .gallery img { width: 100%; max-width: 500px; display: none; }
    .gallery img.active { display: block; }
    .gallery-nav { display: none; gap: 1rem; margin-top: 0.5rem; max-width: 500px; }
    .gallery-nav a { font-size: 0.78rem; color: #000000; text-decoration: none; letter-spacing: 0.01em; cursor: pointer; }
    .gallery-nav a:hover { text-decoration: underline; text-underline-offset: 2px; }
    .item-meta { display: flex; flex-direction: column; gap: 0.15rem; margin-top: 0.75rem; }
    .item-meta span, .item-meta a { font-size: 0.78rem; color: #000000; text-decoration: none; letter-spacing: 0.01em; line-height: 1.6; }
    .item-meta a:hover { text-decoration: underline; text-underline-offset: 2px; }
  </style>
</head>
<body>

  <header>
    <a href="/">← pharmaceutical audio</a>
  </header>

  <!-- BUILD products -->

  <!-- /BUILD -->

  <script>
    document.querySelectorAll('.item').forEach(function (item) {
      var imgs = item.querySelectorAll('.gallery img');
      var nav = item.querySelector('.gallery-nav');
      if (imgs.length < 2 || !nav) return;
      nav.style.display = 'flex';
      var idx = 0;
      var show = function (i) {
        var img = imgs[i];
        if (img.dataset.src && !img.getAttribute('src')) {
          img.setAttribute('src', img.dataset.src);
        }
        imgs.forEach(function (other, n) { other.classList.toggle('active', n === i); });
      };
      nav.querySelector('.prev').addEventListener('click', function (e) {
        e.preventDefault();
        idx = (idx - 1 + imgs.length) % imgs.length;
        show(idx);
      });
      nav.querySelector('.next').addEventListener('click', function (e) {
        e.preventDefault();
        idx = (idx + 1) % imgs.length;
        show(idx);
      });
    });
  </script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>pharmaceutical audio</title>
  <meta name="description" content="record label.">
  <meta property="og:title" content="pharmaceutical audio">
  <meta property="og:description" content="record label.">
  <meta property="og:url" content="https://pharmaceutical.audio/">
  <meta property="og:type" content="website">
  <meta property="og:image" content="https://pharmaceutical.audio/og-image.jpg">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta name="twitter:card" content="summary_large_image">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      background: #ffffff;
    }

    body {
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      padding: 3.5rem 4rem;
    }

    nav {
      display: flex;
      flex-direction: column;
      gap: 0.15rem;
      margin-bottom: 2.5rem;
    }

    nav a {
      font-size: 0.78rem;
      font-weight: 400;
      letter-spacing: 0.01em;
      color: #000000;
      text-decoration: none;
      line-height: 1.6;
      width: fit-content;
    }

    nav a:hover {
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    video {
      width: 20rem;
      max-width: 100%;
      display: block;
      pointer-events: none;
    }
    video::-webkit-media-controls,
    video::-webkit-media-controls-panel,
    video::-webkit-media-controls-play-button,
    video::-webkit-media-controls-start-playback-button {
      display: none !important;
      -webkit-appearance: none;
    }
  </style>
</head>
<body>
  <nav>
    <a href="/audio">pharmaceutical audio</a>
    <a href="/trespasser">trespasser</a>
    <a href="/store">store</a>
  </nav>
  <video autoplay muted playsinline preload="auto" disablepictureinpicture disableremoteplayback controlslist="nodownload nofullscreen noremoteplayback noplaybackrate"></video>
  <script>
    var n = 43;
    var v = document.querySelector('video');
    var lastIdx = null;
    function pickNext() {
      var idx;
      do { idx = Math.floor(Math.random() * n) + 1; }
      while (idx === lastIdx && n > 1);
      lastIdx = idx;
      v.src = '/videos/' + String(idx).padStart(2, '0') + '.mp4';
      var p = v.play();
      if (p !== undefined) p.catch(function () {});
    }
    v.addEventListener('ended', pickNext);
    pickNext();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>pharmaceutical audio</title>
  <meta name="description" content="record label.">
  <meta property="og:title" content="pharmaceutical audio">
  <meta property="og:description" content="record label.">
  <meta property="og:url" content="https://pharmaceutical.audio/">
  <meta property="og:type" content="website">
  <meta property="og:image" content="https://pharmaceutical.audio/og-image.jpg">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta name="twitter:card" content="summary_large_image">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      background: #ffffff;
    }

    body {
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      padding: 3.5rem 4rem;
    }

    nav {
      display: flex;
      flex-direction: column;
      gap: 0.15rem;
      margin-bottom: 2.5rem;
    }

    nav a {
      font-size: 0.78rem;
      font-weight: 400;
      letter-spacing: 0.01em;
      color: #000000;
      text-decoration: none;
      line-height: 1.6;
      width: fit-content;
    }

    nav a:hover {
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    #video-mount {
      position: relative;
      width: 20rem;
      max-width: 100%;
      aspect-ratio: 16 / 9;
    }
    #video-mount video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      opacity: 0;
    }
    #video-mount video.active {
      opacity: 1;
    }
    video::-webkit-media-controls-overlay-play-button,
    video::-webkit-media-controls-start-playback-button {
      display: none !important;
      -webkit-appearance: none;
    }
  </style>
</head>
<body>
  <nav>
    <a href="/audio">pharmaceutical audio</a>
    <a href="/trespasser">trespasser</a>
    <a href="/store">store</a>
  </nav>
  <div id="video-mount"></div>
  <script>
    (function () {
      var n = 43;
      var base = '/videos/';
      var lastIdx = null;

      function pickIdx() {
        var idx;
        do { idx = Math.floor(Math.random() * n) + 1; }
        while (idx === lastIdx && n > 1);
        lastIdx = idx;
        return String(idx).padStart(2, '0');
      }

      function makeVid() {
        var v = document.createElement('video');
        v.muted = true;
        v.defaultMuted = true;
        v.playsInline = true;
        v.preload = 'auto';
        v.setAttribute('muted', '');
        v.setAttribute('playsinline', '');
        v.setAttribute('webkit-playsinline', '');
        v.setAttribute('disablepictureinpicture', '');
        v.setAttribute('disableremoteplayback', '');
        v.setAttribute('controlslist', 'nodownload nofullscreen noremoteplayback noplaybackrate');
        return v;
      }

      function lock(v) { v.style.pointerEvents = 'none'; }

      function attach() {
        var mount = document.getElementById('video-mount');
        var current = makeVid();
        var standby = makeVid();

        current.classList.add('active');
        current.src = base + pickIdx() + '.mp4';
        standby.src = base + pickIdx() + '.mp4';

        mount.innerHTML = '';
        mount.appendChild(current);
        mount.appendChild(standby);

        function rotate() {
          // swap roles instantly: standby has been preloaded during current's playback
          var t = current; current = standby; standby = t;
          current.classList.add('active');
          standby.classList.remove('active');

          var p = current.play();
          if (p !== undefined) p.then(function () { lock(current); }).catch(function () {});

          // begin preloading the next clip on the now-standby element
          standby.src = base + pickIdx() + '.mp4';
          standby.load();

          current.addEventListener('ended', rotate, { once: true });
        }
        current.addEventListener('ended', rotate, { once: true });

        function pauseGuard(v) {
          v.addEventListener('pause', function () {
            if (!v.classList.contains('active')) return; // standby is supposed to be paused
            if (!v.ended && !v.seeking) {
              setTimeout(function () { v.play().catch(function () {}); }, 50);
            }
          });
        }
        pauseGuard(current);
        pauseGuard(standby);

        function tryPlay() {
          var p = current.play();
          if (p !== undefined) {
            p.then(function () { lock(current); }).catch(function () {
              var kick = function () {
                current.play().then(function () { lock(current); }).catch(function () {});
                document.removeEventListener('click', kick);
                document.removeEventListener('touchstart', kick);
                document.removeEventListener('keydown', kick);
              };
              document.addEventListener('click', kick, { once: true });
              document.addEventListener('touchstart', kick, { once: true });
              document.addEventListener('keydown', kick, { once: true });
            });
          } else {
            lock(current);
          }
        }
        tryPlay();
      }

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', attach);
      } else {
        attach();
      }
    })();
  </script>
</body>
</html>
